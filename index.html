<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tupou College Web App</title>
    
    <!-- CRITICAL: Bootstrap loaded IMMEDIATELY (no preload tricks) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CRITICAL INLINE STYLES - These guarantee no shifts -->
    <style>
        /* FORCE all dimensions - these override everything */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Force navbar height */
        .navbar {
            display: flex !important;
            min-height: 70px !important;
            height: 70px !important;
            background-color: #0d6efd !important;
            width: 100% !important;
            position: relative !important;
            z-index: 1000 !important;
        }
        
        .navbar-brand {
            line-height: 1.2 !important;
            font-size: 1.25rem !important;
        }
        
        /* Force container dimensions */
        .container {
            width: 100% !important;
            max-width: 1140px !important;
            margin-left: auto !important;
            margin-right: auto !important;
            padding-left: 15px !important;
            padding-right: 15px !important;
        }
        
        .my-4 {
            margin-top: 1.5rem !important;
            margin-bottom: 1.5rem !important;
        }
        
        /* Force card dimensions */
        .card {
            display: flex !important;
            flex-direction: column !important;
            min-height: 450px !important;
            height: auto !important;
            background: white !important;
            border: 1px solid rgba(0,0,0,.125) !important;
            border-radius: 0.375rem !important;
            box-shadow: 0 .125rem .25rem rgba(0,0,0,.075) !important;
            width: 100% !important;
        }
        
        .card-header {
            min-height: 58px !important;
            height: 58px !important;
            background-color: #0d6efd !important;
            color: white !important;
            padding: 0.75rem 1.25rem !important;
            border-bottom: 1px solid rgba(0,0,0,.125) !important;
            display: flex !important;
            align-items: center !important;
        }
        
        .card-header h1 {
            margin: 0 !important;
            font-size: 1.25rem !important;
            font-weight: 500 !important;
            line-height: 1.2 !important;
        }
        
        .card-body {
            flex: 1 !important;
            padding: 1.25rem !important;
        }
        
        /* Force form element dimensions */
        .mb-3 {
            margin-bottom: 1rem !important;
            min-height: 85px !important;
        }
        
        .form-label {
            display: block !important;
            margin-bottom: 0.5rem !important;
            font-weight: 400 !important;
            min-height: 24px !important;
            line-height: 1.5 !important;
        }
        
        .form-control {
            display: block !important;
            width: 100% !important;
            min-height: 48px !important;
            height: 48px !important;
            padding: 0.375rem 0.75rem !important;
            font-size: 1rem !important;
            line-height: 1.5 !important;
            color: #212529 !important;
            background-color: #fff !important;
            border: 1px solid #ced4da !important;
            border-radius: 0.375rem !important;
        }
        
        textarea.form-control {
            min-height: 120px !important;
            height: 120px !important;
            resize: vertical !important;
        }
        
        /* Force button dimensions */
        .btn {
            display: inline-block !important;
            min-height: 48px !important;
            height: 48px !important;
            padding: 0.375rem 0.75rem !important;
            font-size: 1rem !important;
            line-height: 1.5 !important;
            border-radius: 0.375rem !important;
            border: none !important;
            cursor: pointer !important;
        }
        
        .btn-success {
            background-color: #198754 !important;
            color: white !important;
            width: 100% !important;
        }
        
        /* Force footer dimensions */
        footer {
            min-height: 70px !important;
            height: 70px !important;
            text-align: center !important;
            padding: 1rem !important;
            background: transparent !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        /* Force all images to have dimensions */
        img {
            max-width: 100% !important;
            height: auto !important;
            display: block !important;
            aspect-ratio: 16/9 !important;
            background: #f0f0f0 !important;
        }
        
        /* Hide any layout shifts */
        body {
            overflow-x: hidden !important;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif !important;
        }
        
        /* Ensure nothing changes size after load */
        * {
            transition: none !important;
        }
    </style>
</head>
<body>
    <!-- Navigation with EXACT dimensions -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Tupou College Web App</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h1 class="h4 mb-0">Contact Us</h1>
            </div>
            <div class="card-body">
                <form action="process_form.php" method="POST">
                    <div class="mb-3">
                        <label for="emailInput" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="emailInput" name="email" placeholder="name@example.com" required autocomplete="email">
                    </div>
                    <div class="mb-3">
                        <label for="subjectInput" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="subjectInput" name="subject" placeholder="How can we help?" required>
                    </div>
                    <div class="mb-3">
                        <label for="messageInput" class="form-label">Message</label>
                        <textarea class="form-control" id="messageInput" name="message" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-3">
        <small>&copy; 2026 Tupou College Web App</small>
    </footer>

    <!-- Load JS last (doesn't affect CLS) -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</body>
</html>
